input: $input
output: $output
datadir: $datadir
batchsize: $batch_size
options:
  overwrite: false
  maxcores: $max_cores
  progress: true
  chunksize: NULL

resources:
  get_gfw_treecover:
    args:
      version: GFC-2023-v1.11
  get_gfw_lossyear:
    args:
      version: GFC-2023-v1.11
  get_gmw:
    args:
      years: [2015, 2016, 2017, 2018, 2019, 2020]
  get_ipbes_biomes: 
  get_man_carbon: 
  get_humanfootprint: 
    args:
      years: [2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020]
  get_worldpop:
    args:
      years: [2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020]
  get_iucn:
    args:
      paths:
        - $raw/Amphibians_SR_2023.tif
        - $raw/Amphibians_THR_SR_2023.tif
        - $raw/Birds_SR_2023.tif
        - $raw/Birds_THR_SR_2023.tif
        - $raw/Combined_SR_2023.tif
        - $raw/Combined_THR_SR_2023.tif
        - $raw/Mammals_SR_2023.tif
        - $raw/Mammals_THR_SR_2023.tif
        - $raw/Reptiles_SR_2023.tif
        - $raw/Reptiles_THR_SR_2023.tif
  get_key_biodiversity_areas:
    args:
      path: $raw/kbas.gpkg
  get_acled:
    args:
      accept_terms: true
      years: [2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023]

indicators:
  calc_treecover_area:
    args:
      years: [2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023]
      min_cover: 10
      min_size: 1
    options:
      chunksize: 250000
  calc_mangroves_area:
  calc_ipbes_biomes:
  calc_man_carbon:
    args:
      type: all
      engine: exactextract
      stats: sum
    options:
      chunksize: 500000
  calc_humanfootprint:
    args:
      stats: mean
      engine: exactextract
    options:
       chunksize: 100000
  calc_species_richness:
    args:
      stats: max
      engine: exactextract
  calc_key_biodiversity_area:
  calc_fatalities_acled:
    args:
      years: [2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023]
      